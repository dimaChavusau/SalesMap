<!-- salesMapContainerLwc.html - FIXED HTML SYNTAX -->
<template>
    <div class="sales-map-container">
        <!-- Error Boundary Display -->
        <template if:true={hasError}>
            <div class="error-message">
                <lightning-icon icon-name="utility:error" size="small"></lightning-icon>
                {errorMessage}
            </div>
        </template>

        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <div class="map-loading-overlay">
                <lightning-spinner variant="brand" alternative-text="Loading accounts..."></lightning-spinner>
            </div>
        </template>

        <div class="map-body">
            <!-- Toggle Button for Filter Panel -->
            <button class={hamburgerClass} type="button" onclick={toggleFilterPanel}>
                <span class="hamburger-box">
                    <span class="hamburger-inner"></span>
                </span>
            </button>

            <!-- Filter Panel -->
            <div class={filterContainerClass}>
                <c-sales-map-filters
                    user-affiliate-code={userAffiliateCode}
                    show-merchant-status-filter={showMerchantStatusFilter}
                    onfilterschange={handleFiltersChange}
                    onsearch={handleSearch}
                    onreset={handleReset}>
                </c-sales-map-filters>
            </div>

            <!-- Map Content -->
            <div class={mapContentClass}>
                <template if:true={hasAccounts}>
                    <!-- Map Component with Controls -->
                    <div class="map-wrapper">
                        <lightning-map
                            map-markers={displayedMapMarkers}
                            zoom-level={zoomLevel}
                            center={mapCenter}
                            list-view="hidden"
                            selected-marker-value={selectedMarkerValue}
                            onmarkerselect={handleMarkerSelect}
                            class="google-map">
                        </lightning-map>
                        <template if:true={showInfoPanel}>
                            <div class="custom-info-panel">
                                <div class="info-panel-header">
                                    <h3>{selectedAccountName}</h3>
                                    <lightning-button-icon
                                        icon-name="utility:close"
                                        variant="bare"
                                        onclick={handleCloseInfoPanel}
                                        alternative-text="Close">
                                    </lightning-button-icon>
                                </div>
                                <div class="info-panel-body">
                                    <lightning-formatted-rich-text
                                        value={selectedAccountDescription}>
                                    </lightning-formatted-rich-text>
                                </div>
                                <div class="info-panel-actions">
                                    <lightning-button
                                        label="Navigate"
                                        icon-name="utility:map"
                                        onclick={handleNavigate}
                                        class="slds-m-right_x-small">
                                    </lightning-button>
                                    <lightning-button
                                        label="Edit Account"
                                        icon-name="utility:edit"
                                        onclick={handleEditAccount}
                                        class="slds-m-right_x-small">
                                    </lightning-button>
                                    <lightning-button
                                        label="Schedule Event"
                                        icon-name="utility:event"
                                        variant="brand"
                                        onclick={handleScheduleEvent}>
                                    </lightning-button>
                                </div>
                            </div>
                        </template>
                        <!-- Map Options Bar (Positioned over map) -->
                        <div class="map-options-container">
                            <!-- Fit Map Button -->
                            <button class="map-control-button" onclick={fitMapToMarkers} title="Fit map to markers">
                                <lightning-icon icon-name="utility:expand" size="x-small"></lightning-icon>
                                <span class="tooltip">Fit map to markers</span>
                            </button>
                            
                            <!-- Nearby Places Button -->
                            <button class="map-control-button" onclick={toggleNearbyPlaces} title="Nearby places">
                                <lightning-icon icon-name="utility:location" size="x-small"></lightning-icon>
                                <span class="tooltip">Nearby places</span>
                            </button>
                            
                            <!-- Main Account Toggle Switch -->
                            <div class="switch-container">
                                <label class="switch">
                                    <input type="checkbox" checked={onlyMainAccounts} onchange={handleMainAccountToggle}/>
                                    <span class="slider">
                                        <span class="slider-text slider-text-on">main Accounts</span>
                                        <span class="slider-text slider-text-off">all Accounts</span>
                                    </span>
                                </label>
                            </div>
                        </div>

                        <!-- Clustering Controls -->
                        <template if:true={clusteringEnabled}>
                            <div class="clustering-controls">
                                <div class="clustering-button active">
                                    <lightning-icon icon-name="utility:cluster" size="xx-small"></lightning-icon>
                                    <span>Clustering Active</span>
                                </div>
                            </div>
                        </template>

                        <!-- Heatmap Controls -->
                        <template if:true={heatmapEnabled}>
                            <div class="heatmap-controls">
                                <div class="clustering-button active">
                                    <lightning-icon icon-name="utility:world" size="xx-small"></lightning-icon>
                                    <span>Heatmap Active</span>
                                </div>
                                <div class="heatmap-slider">
                                    <lightning-slider
                                        label="Intensity"
                                        min="1"
                                        max="100"
                                        value={heatmapIntensity}
                                        onchange={handleHeatmapIntensityChange}
                                        size="small">
                                    </lightning-slider>
                                </div>
                            </div>
                        </template>

                        <!-- Nearby Places Panel -->
                        <template if:true={nearbyPlacesVisible}>
                            <div class="nearby-panel">
                                <div class="nearby-header">Nearby Places</div>
                                <div class="nearby-buttons">
                                    <button 
                                        class={nearbyButtonHotelsClass}
                                        onclick={handleToggleHotels}>
                                        <lightning-icon icon-name="custom:custom19" size="xx-small"></lightning-icon>
                                        <span>Hotels</span>
                                    </button>
                                    
                                    <button 
                                        class={nearbyButtonRestaurantsClass}
                                        onclick={handleToggleRestaurants}>
                                        <lightning-icon icon-name="custom:custom24" size="xx-small"></lightning-icon>
                                        <span>Restaurants</span>
                                    </button>
                                    
                                    <button 
                                        class={nearbyButtonParkingClass}
                                        onclick={handleToggleParking}>
                                        <lightning-icon icon-name="custom:custom76" size="xx-small"></lightning-icon>
                                        <span>Parking</span>
                                    </button>
                                </div>
                            </div>
                        </template>

                        <!-- Geolocation Update Modal -->
                        <template if:true={showGeolocationModal}>
                            <div class="geolocation-modal-backdrop"></div>
                            <div class="geolocation-modal">
                                <h3>Update Account Location</h3>
                                <p>You moved the marker for <strong>{draggedAccountName}</strong>.</p>
                                <p>Would you like to save this new location?</p>
                                
                                <div class="slds-m-top_medium">
                                    <lightning-button
                                        label="Save New Location"
                                        variant="brand"
                                        onclick={handleConfirmGeolocationUpdate}
                                        class="slds-m-right_small">
                                    </lightning-button>
                                    
                                    <lightning-button
                                        label="Cancel"
                                        variant="neutral"
                                        onclick={handleCancelGeolocationUpdate}>
                                    </lightning-button>
                                </div>
                            </div>
                        </template>

                        <!-- Legend -->
                        <c-clickable-map-legend
                            title="Legend"
                            selected-view={selectedView}
                            items={legendItems}
                            onlegenditemtoggle={handleLegendItemToggle}
                            onlegendreset={handleLegendReset}
                            onshowtoast={handleShowToast}>
                        </c-clickable-map-legend>
                    </div>

                    <!-- View Options -->
                    <div class="options-row options-row_margin_small">
                        <div class="selectViewOptions-wrapper">
                            <div>Colorize marker based on:</div>
                            <lightning-combobox
                                name="viewOptions"
                                value={selectedView}
                                options={viewOptions}
                                onchange={handleViewChange}
                                variant="label-hidden"
                                class="selectViewOptions">
                            </lightning-combobox>
                        </div>
                    </div>

                    <!-- Account Table -->
                    <div class="table-wrapper">
                        <c-account-data-table
                            accounts={displayedAccounts}
                            columns={tableColumns}
                            title={tableTitle}
                            show-download-button
                            onsearch={handleTableSearch}
                            onrowaction={handleRowAction}>
                        </c-account-data-table>
                    </div>
                </template>

                <template if:false={hasAccounts}>
                    <div class="simpleMap">
                        We could not find a Territory assigned to you. Please use the search options to see account data and the map.
                    </div>
                </template>
            </div>
        </div>

        <!-- Event Creation Modal -->
        <template if:true={showEventModal}>
            <c-account-quick-event-lwc
                record-id={selectedAccountId}
                mode="modal"
                show-close-button
                show-backdrop
                oncreated={handleEventCreated}
                onclose={handleEventClose}>
            </c-account-quick-event-lwc>
        </template>
    </div>
</template>
